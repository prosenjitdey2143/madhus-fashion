name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build with Vite
        run: npm run build
        env:
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: "AIzaSyB1cn1K_B43Dzaqo7hNq_p2MD5FPPMUzSI"
          VITE_FIREBASE_AUTH_DOMAIN: "madhus-fashion.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "madhus-fashion"
          VITE_FIREBASE_STORAGE_BUCKET: "madhus-fashion.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "989199848064"
          VITE_FIREBASE_APP_ID: "1:989199848064:web:c59b86ce7fb28b28e80c65"
          VITE_ADMIN_EMAIL: "prosenjitdey2143@gmail.com"
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
